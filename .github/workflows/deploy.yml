name: Deploy Backend

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            BEFORE=$(git rev-parse HEAD)
            git pull origin master
            AFTER=$(git rev-parse HEAD)

            if [ "$BEFORE" = "$AFTER" ]; then
              echo "Nessuna modifica rilevata: nessun rebuild necessario."
              exit 0
            fi

            CHANGED=$(git diff --name-only "$BEFORE" "$AFTER")
            echo "File modificati:"
            echo "$CHANGED"

            cd docker

            REBUILD_USERS=false

            # Modifiche all'infrastruttura docker (compose, nginx.conf, ...) => rebuild completo
            if echo "$CHANGED" | grep -qE '^docker/'; then
              echo "Modifiche all'infrastruttura docker: rebuild completo."
              docker-compose up -d --build
              docker-compose restart nginx || true
              REBUILD_USERS=true
            else
              # Mappa i path services/<nome>/... sul relativo servizio compose <nome>_ms
              SERVICES=$(echo "$CHANGED" | sed -n 's#^services/\([^/]*\)/.*#\1_ms#p' | sort -u)
              if [ -z "$SERVICES" ]; then
                echo "Nessun microservizio toccato: nessun rebuild necessario."
                exit 0
              fi
              echo "Microservizi da ricostruire: $SERVICES"
              docker-compose up -d --build --no-deps $SERVICES
              if echo "$SERVICES" | grep -qw users_ms; then
                REBUILD_USERS=true
              fi
            fi

            # Mostra i log delle migrazioni solo se users_ms e' stato ricostruito
            if [ "$REBUILD_USERS" = "true" ]; then
              echo "Waiting for users_ms to complete migrations..."
              sleep 20
              docker logs users_ms 2>&1 | grep -E "\[entrypoint\]|Migration" || true
            fi

            echo "Deploy completed."
