name: Deploy Backend

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Builda con il builder classico: le immagini cosi' generate includono
            # il metadato "ContainerConfig" richiesto da docker-compose v1, evitando
            # il bug "KeyError: 'ContainerConfig'" durante la ricreazione dei container.
            export DOCKER_BUILDKIT=0
            export COMPOSE_DOCKER_CLI_BUILD=0

            BEFORE=$(git rev-parse HEAD)
            git pull origin master
            AFTER=$(git rev-parse HEAD)

            if [ "$BEFORE" = "$AFTER" ]; then
              echo "Nessuna modifica rilevata: nessun rebuild necessario."
              exit 0
            fi

            CHANGED=$(git diff --name-only "$BEFORE" "$AFTER")
            echo "File modificati:"
            echo "$CHANGED"

            cd docker

            REBUILD_USERS=false
            REBUILD_PAYMENTS=false

            # Ricreazione robusta al bug di docker-compose v1 "KeyError: 'ContainerConfig'":
            # si rimuovono i container prima di ricrearli, cosi' compose non tenta di
            # ereditare i volumi dal vecchio container (i volumi named persistono comunque).
            # $@ = elenco servizi (vuoto = tutti). --no-deps e' innocuo quando $@ e' vuoto.
            recreate() {
              docker-compose build "$@"
              docker-compose rm -sf "$@" || true
              docker-compose up -d --no-deps "$@"
            }

            # Modifiche all'infrastruttura docker (compose, nginx.conf, ...) => rebuild completo
            if echo "$CHANGED" | grep -qE '^docker/'; then
              echo "Modifiche all'infrastruttura docker: rebuild completo."
              recreate
              docker-compose restart nginx || true
              REBUILD_USERS=true
              REBUILD_PAYMENTS=true
            else
              # Mappa i path services/<nome>/... sul relativo servizio compose <nome>_ms
              SERVICES=$(echo "$CHANGED" | sed -n 's#^services/\([^/]*\)/.*#\1_ms#p' | sort -u)
              if [ -z "$SERVICES" ]; then
                echo "Nessun microservizio toccato: nessun rebuild necessario."
                exit 0
              fi
              echo "Microservizi da ricostruire: $SERVICES"
              recreate $SERVICES
              if echo "$SERVICES" | grep -qw users_ms; then
                REBUILD_USERS=true
              fi
              if echo "$SERVICES" | grep -qw payments_ms; then
                REBUILD_PAYMENTS=true
              fi
            fi

            # Mostra i log delle migrazioni solo se users_ms e' stato ricostruito
            if [ "$REBUILD_USERS" = "true" ]; then
              echo "Waiting for users_ms to complete migrations..."
              sleep 20
              docker logs users_ms 2>&1 | grep -E "\[entrypoint\]|Migration" || true
            fi

            # Idem per payments_ms (baseline + sequelize-cli db:migrate all'avvio)
            if [ "$REBUILD_PAYMENTS" = "true" ]; then
              echo "Waiting for payments_ms to complete migrations..."
              sleep 20
              docker logs payments_ms 2>&1 | grep -E "\[entrypoint\]|\[baseline\]|migrat" || true
            fi

            echo "Deploy completed."
